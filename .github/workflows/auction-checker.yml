name: Auction Checker

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # needed to push changes

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python bot.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

      - name: Commit updated state.json
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B auction-state
          git add state.json
          git commit -m "Update auction state [skip ci]" || echo "No changes to commit"
          git push https://${{ secrets.GH_PAT }}@github.com/AdamEkwall/wow-auction-bot.git auction-state --force
