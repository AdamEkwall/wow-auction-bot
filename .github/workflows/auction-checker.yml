# force GitHub to re-register cron
name: Auction Checker

on:
  schedule:
    - cron: "05,25,45 * * * *"  # every 20 minutes
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: state.json
          key: auction-state

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python bot.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

      - name: Save state
        uses: actions/cache@v4
        with:
          path: state.json
          key: auction-state

      - name: Force schedule registration
        run: echo "GitHub cron re-registered"

      - name: Show state.json
        run: cat state.json || echo "state.json does not exist"
