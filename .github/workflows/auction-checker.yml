name: Auction Checker

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Restore state.json
        run: |
          git fetch origin auction-state || echo "No auction-state branch yet"
          git checkout origin/auction-state -- state.json || echo "No state.json yet"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python bot.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

      - name: Commit updated state.json
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "actions@github.com"
          git checkout -B auction-state
          git add state.json
          git commit -m "Update auction state [skip ci]" || echo "No changes to commit"
          git remote remove origin
          git remote add origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/AdamEkwall/wow-auction-bot.git
          git push origin auction-state --force

      - name: Show state.json
        run: cat state.json || echo "state.json does not exist"
