name: Auction Checker

on:
  schedule:
    - cron: "*/15 * * * *"  # every 15 min UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Load previous state
        uses: actions/cache@v4
        with:
          path: state.json
          key: auction-state

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome & Driver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-driver

      - name: Run bot
        run: python bot.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

      - name: Upload full page HTML
        uses: actions/upload-artifact@v3
        with:
          name: full_page
          path: full_page.html  

      - name: Save state
        uses: actions/cache@v4
        with:
          path: state.json
          key: auction-state
